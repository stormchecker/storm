name: CI PR Ready for Review / Master
# Runs on PRs labelled "ready for review" and on every master push.
# Full task suite: compile flags, all tests, starter project, install, deploy.
# Cache is read-only on PRs, disabled on master.

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  buildTests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: true
      matrix:
        config:
          - {name: "Debug; All dependencies",
             buildType: "Debug",
             baseImg: "movesrwth/storm-dependencies:latest",
             disable_all: false,
             ClnExact: false,
             ClnRatfunc: false
          }
          - {name: "Release; All dependencies",
             buildType: "Release",
             baseImg: "movesrwth/storm-dependencies:latest",
             disable_all: false,
             ClnExact: false,
             ClnRatfunc: false
          }
          - {name: "Release; GMP; GMP; Required dependencies",
             buildType: "Release",
             baseImg: "movesrwth/storm-basesystem:latest",
             disable_all: false,
             ClnExact: false,
             ClnRatfunc: false
          }
          - {name: "Release; CLN; CLN; Required dependencies",
             buildType: "Release",
             baseImg: "movesrwth/storm-basesystem:latest",
             disable_all: false,
             ClnExact: true,
             ClnRatfunc: true
          }
    uses: ./.github/workflows/test-build.yml
    with:
      nr_jobs: "4"
      name: ${{ matrix.config.name }}
      baseImg: ${{ matrix.config.baseImg }}
      buildType: ${{ matrix.config.buildType }}
      disable_cudd: ${{ matrix.config.disable_all }}
      disable_glpk: ${{ matrix.config.disable_all }}
      disable_gmm: ${{ matrix.config.disable_all }}
      disable_gurobi: ${{ matrix.config.disable_all }}
      disable_libarchive: ${{ matrix.config.disable_all }}
      disable_mathsat: ${{ matrix.config.disable_all }}
      disable_soplex: ${{ matrix.config.disable_all }}
      disable_spot: ${{ matrix.config.disable_all }}
      disable_sylvan: ${{ matrix.config.disable_all }}
      disable_xerces: ${{ matrix.config.disable_all }}
      disable_z3: ${{ matrix.config.disable_all }}
      Developer: ${{ matrix.config.buildType == 'Debug' }}
      ClnExact: ${{ matrix.config.ClnExact }}
      ClnRatfunc: ${{ matrix.config.ClnRatfunc }}
      AllSanitizers: false
      restore_cache: ${{ github.event_name != 'push' }}
      save_cache: false
      install: true

  compilerTests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: true
      matrix:
        config:
          - {name: "GCC",
             cmakeArgs: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "",
             dockerfile: ".github/workflows/Dockerfile.archlinux",
             baseImg: "archlinux:latest"
          }
          - {name: "Clang",
             cmakeArgs: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "clang",
             dockerfile: ".github/workflows/Dockerfile.archlinux",
             baseImg: "archlinux:latest"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      nr_jobs: "4"
      name: ${{ matrix.config.name }}
      buildType: Debug
      Developer: true
      baseImg: ${{ matrix.config.baseImg }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      packages: ${{ matrix.config.packages }}
      dockerfile: ${{ matrix.config.dockerfile }}
      starterProjectCommand: "/opt/storm/resources/examples/testfiles/dtmc/brp-16-2.pm 'P=? [F s=5]'"
      restore_cache: ${{ github.event_name != 'push' }}
      save_cache: false
      install: true

  linuxTests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: true
      matrix:
        distro: ["debian-12", "debian-13", "ubuntu-24.04"]
    uses: ./.github/workflows/test-linux.yml
    with:
      nr_jobs: "4"
      distro: ${{ matrix.distro }}
      buildType: Debug
      runner: ubuntu-latest
      restore_cache: ${{ github.event_name != 'push' }}
      save_cache: false
      install: true

  macTests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: true
      matrix:
        config:
          - {name: "Mac 14, ARM",
             distro: "macos-14",
             xcode: "15.4",
             buildType: "Release"
          }
          - {name: "Mac 15, ARM",
             distro: "macos-15",
             xcode: "16.4",
             buildType: "Release"
          }
          - {name: "Mac 26, ARM",
             distro: "macos-26",
             xcode: "latest-stable",
             buildType: "Release"
          }
          - {name: "Mac 26, Intel",
             distro: "macos-26-intel",
             xcode: "latest-stable",
             buildType: "Release"
          }
    uses: ./.github/workflows/test-mac.yml
    with:
      nr_jobs: "4"
      name: ${{ matrix.config.name }}
      distro: ${{ matrix.config.distro }}
      xcode: ${{ matrix.config.xcode }}
      buildType: ${{ matrix.config.buildType }}
      restore_cache: ${{ github.event_name != 'push' }}
      save_cache: false
      install: true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: true
      matrix:
        config:
          - {buildType: "Debug",
             dockerTag: "ci-debug"
          }
          - {buildType: "Release",
             dockerTag: "ci"
          }
    uses: ./.github/workflows/test-deploy.yml
    with:
      nr_jobs: "4"
      buildType: ${{ matrix.config.buildType }}
      dockerTag: ${{ matrix.config.dockerTag }}
    secrets: inherit
